version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: cyber_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: cyber_threat_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - cyber_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cyber_threat_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: cyber_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/cyber_threat_db
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      FRONTEND_URL: http://localhost:3000
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-flash-latest}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: cyber_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    ports:
      - "3000:3000"

volumes:
  cyber_db_data:
